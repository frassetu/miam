<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Alimentaire</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --card: #20242f;
    --accent: #e8c97d;
    --accent2: #7dd4e8;
    --text: #f0ede6;
    --muted: #8a8fa8;
    --border: #2e3244;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(232,201,125,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(125,212,232,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 38px);
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px 20px;
    margin-bottom: 32px;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,201,125,0.08);
  }

  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .nav-center {
    text-align: center;
    flex: 1;
    padding: 0 16px;
  }

  .nav-day {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .nav-date {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  .nav-dots {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 10px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .dot.active {
    background: var(--accent);
    width: 18px;
    border-radius: 3px;
  }

  /* Day view */
  .day-view {
    animation: slideIn 0.35s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Meal cards */
  .meal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .meal-card:hover {
    border-color: rgba(232,201,125,0.3);
  }

  .meal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .meal-icon {
    font-size: 20px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(232,201,125,0.08);
    border-radius: 10px;
    flex-shrink: 0;
  }

  .meal-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.2px;
  }

  .meal-body {
    padding: 14px 20px;
  }

  .food-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid rgba(46,50,68,0.5);
  }

  .food-item:last-child { border-bottom: none; }

  .food-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }

  .food-qty {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    white-space: nowrap;
    margin-left: 12px;
  }

  .food-qty .highlight {
    color: var(--accent2);
    font-weight: 500;
  }

  /* Note card */
  .note-card {
    background: rgba(232,201,125,0.05);
    border: 1px solid rgba(232,201,125,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 14px;
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.6;
  }

  .note-card strong {
    color: var(--accent);
    font-weight: 500;
  }

  /* Whey badge */
  .whey-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(125,212,232,0.1);
    border: 1px solid rgba(125,212,232,0.25);
    color: var(--accent2);
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 4px;
  }
</style>

// Day 1 = tomorrow = Thursday April 30, 2026
const startDate = new Date(2026, 3, 30); // months are 0-indexed

const DAY_NAMES = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const MONTH_NAMES = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];

let currentDay = 0; // 0-indexed

function getDateForDay(index) {
  const d = new Date(startDate);
  d.setDate(d.getDate() + index);
  return `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}

function buildDots() {
  const container = document.getElementById('navDots');
  container.innerHTML = '';
  DAYS_DATA.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentDay ? ' active' : '');
    dot.onclick = () => goToDay(i);
    container.appendChild(dot);
  });
}

function renderDay(direction = 1) {
  const data = DAYS_DATA[currentDay];
  document.getElementById('navDay').textContent = data.label;
  document.getElementById('navDate').textContent = getDateForDay(currentDay);
  document.getElementById('prevBtn').disabled = currentDay === 0;
  document.getElementById('nextBtn').disabled = currentDay === DAYS_DATA.length - 1;
  buildDots();

  const view = document.getElementById('dayView');
  view.style.animation = 'none';
  view.offsetHeight; // reflow
  view.style.animation = direction >= 0 ? 'slideIn 0.35s ease both' : 'slideInLeft 0.35s ease both';

  let html = '';

  if (data.note) {
    html += `<div class="note-card">📌 ${data.note}</div>`;
  }

  data.meals.forEach(meal => {
    html += `
      <div class="meal-card">
        <div class="meal-header">
          <div class="meal-icon">${meal.icon}</div>
          <div class="meal-title">${meal.title}</div>
        </div>
        <div class="meal-body">`;

    meal.items.forEach(item => {
      if (item.whey) {
        html += `<div class="food-item">
          <span class="food-name">${item.name}</span>
          <span class="whey-badge">💪 ${item.qty}</span>
        </div>`;
      } else {
        html += `<div class="food-item">
          <span class="food-name">${item.name}</span>
          ${item.qty ? `<span class="food-qty">${item.qty}</span>` : ''}
        </div>`;
      }
    });

    html += `</div></div>`;
  });

  view.innerHTML = html;
}

function changDay(dir) {
  const next = currentDay + dir;
  if (next < 0 || next >= DAYS_DATA.length) return;
  currentDay = next;
  renderDay(dir);
}

function goToDay(index) {
  const dir = index >= currentDay ? 1 : -1;
  currentDay = index;
  renderDay(dir);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') changDay(1);
  if (e.key === 'ArrowLeft') changDay(-1);
});

renderDay(1);
